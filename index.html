<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortabio - La tablette ludique & éducative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tortabio-green-dark: #2E7D32;
            --tortabio-green-bright: #4CAF50;
            --tortabio-green-light: #E8F5E9;
            --tortabio-pink-main: #FF6B8B;
            --tortabio-pink-light: #FFF0F3;
            --tortabio-dark: #2C3E50;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            color: var(--tortabio-dark);
            line-height: 1.6;
            
            /* FOND GRADIENT MODERNE ET ÉLÉGANT (ROSE & VERT) */
            background-color: #f6faf6;
            background-image: 
                radial-gradient(at 0% 0%, rgba(244, 211, 219, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(212, 239, 216, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 211, 219, 0.5) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(212, 239, 216, 0.6) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(255, 240, 243, 0.4) 0px, transparent 80%);
            background-attachment: fixed;
        }

        /* Barre de Navigation */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 55px;
            width: 55px;
            object-fit: contain;
            border-radius: 12px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--tortabio-pink-main);
            letter-spacing: 0.5px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--tortabio-dark);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: var(--tortabio-green-bright);
        }

        .nav-cta {
            background-color: var(--tortabio-pink-main);
            color: white !important;
            padding: 10px 24px;
            border-radius: 20px;
            box-shadow: 0 6px 14px rgba(255, 107, 139, 0.2);
        }

        .nav-cta:hover {
            transform: translateY(-1px);
            background-color: #ff5276;
            box-shadow: 0 8px 16px rgba(255, 107, 139, 0.3);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, rgba(238, 247, 240, 0.7) 0%, rgba(253, 242, 244, 0.7) 100%);
            padding: 100px 8% 80px 8%;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--tortabio-dark);
        }

        .hero p {
            font-size: 1.4rem;
            max-width: 750px;
            margin: 0 auto 40px auto;
            color: #576574;
        }

        .cta-big {
            display: inline-block;
            background-color: var(--tortabio-green-bright);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 16px 40px;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.2);
            transition: all 0.3s ease;
        }

        .cta-big:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(76, 175, 80, 0.3);
        }

        /* Sections */
        .presentation {
            padding: 90px 8%;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .section-title {
            font-size: 2.6rem;
            color: var(--tortabio-dark);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .section-subtitle {
            font-size: 1.2rem;
            color: #64748B;
            margin-bottom: 50px;
        }

        .pitch-box {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 45px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.7);
            font-size: 1.2rem;
            color: #475569;
            text-align: left;
            max-width: 900px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2.3rem;
            margin-bottom: 20px;
            display: inline-block;
            padding: 14px;
            background-color: var(--tortabio-green-light);
            border-radius: 20px;
        }

        .feature-card:nth-child(even) .feature-icon {
            background-color: var(--tortabio-pink-light);
        }

        .feature-card h3 {
            font-size: 1.4rem;
            color: var(--tortabio-dark);
            margin-bottom: 12px;
        }

        .feature-card p {
            color: #64748B;
            font-size: 1rem;
        }

        /* Galerie d'images zoomables */
        .gallery-section {
            padding: 90px 8%;
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 35px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            max-height: 240px;
            object-fit: contain;
            border-radius: 16px;
        }

        .gallery-item p {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--tortabio-dark);
            margin-top: 18px;
        }

        /* Fenêtre de Zoom (Modal) */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 999;
